<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DGA estimated compliance score calculator</title>
<style>
  :root {
    --surface-0: #f5f5f4;
    --surface-1: #ffffff;
    --border: #e2e2df;
    --text-primary: #1a1a18;
    --text-secondary: #57564f;
    --text-muted: #8a8983;
    --accent-bg: #e6f1fb;
    --accent-text: #0c447c;
    --green: #1d9e75;
    --coral: #d85a30;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    padding: 2rem 1rem;
    background: var(--surface-0);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Arial, sans-serif;
    color: var(--text-primary);
    display: flex;
    justify-content: center;
  }
  .card {
    width: 100%;
    max-width: 640px;
    background: var(--surface-1);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 2rem;
  }
  h1 {
    font-size: 20px;
    font-weight: 600;
    margin: 0 0 1.5rem;
  }
  .control {
    background: var(--surface-0);
    border-radius: 12px;
    padding: 1rem 1.25rem;
    margin-bottom: 1.25rem;
  }
  .control-header {
    display: flex;
    justify-content: space-between;
    align-items: baseline;
    margin-bottom: 8px;
  }
  .control-header label {
    font-size: 13px;
    color: var(--text-secondary);
  }
  .control-header span {
    font-size: 13px;
    color: var(--text-muted);
  }
  input[type="range"] {
    width: 100%;
    accent-color: #333;
  }
  .results {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 12px;
    margin: 1.75rem 0;
  }
  .result-card {
    border-radius: 14px;
    padding: 1.5rem 1.25rem;
  }
  .result-card.score {
    background: var(--accent-bg);
  }
  .result-card .result-label {
    font-size: 13px;
    font-weight: 600;
    margin: 0 0 8px;
  }
  .result-card.score .result-label {
    color: var(--accent-text);
  }
  .result-card.score .result-value {
    font-size: 40px;
    font-weight: 700;
    color: var(--accent-text);
    margin: 0;
    line-height: 1.1;
  }
  .result-card.eligibility {
    background: var(--surface-0);
    border: 1px solid var(--border);
  }
  .result-card.eligibility .result-label {
    color: var(--text-secondary);
  }
  .result-badge {
    display: inline-block;
    font-size: 18px;
    font-weight: 700;
    padding: 6px 0;
  }
  .result-badge.met {
    color: #085041;
  }
  .result-badge.not-met {
    color: #791f1f;
  }
  .result-reason {
    font-size: 12px;
    color: var(--text-muted);
    margin: 8px 0 0;
  }
  .score-bar-wrap {
    margin-top: 1rem;
  }
  .bar-labels {
    display: flex;
    justify-content: space-between;
    font-size: 11px;
    color: var(--text-muted);
    margin-bottom: 6px;
  }
  .bar-track {
    position: relative;
    height: 10px;
    background: rgba(255,255,255,0.6);
    border-radius: 5px;
  }
  .bar-fill {
    position: absolute;
    left: 0;
    top: 0;
    height: 100%;
    border-radius: 5px;
    background: var(--green);
    transition: width 0.15s ease, background 0.15s ease;
  }
  .bar-target {
    position: absolute;
    left: 70%;
    top: -3px;
    width: 2px;
    height: 16px;
    background: var(--text-muted);
  }
  .status-line {
    font-size: 11px;
    color: var(--accent-text);
    margin: 8px 0 0;
    opacity: 0.8;
  }
  .breakdown {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 8px;
    margin-bottom: 0.5rem;
    padding-top: 0.5rem;
    border-top: 1px solid var(--border);
  }
  .breakdown-item {
    padding: 0.5rem 0.25rem;
  }
  .breakdown-item p.label {
    font-size: 11px;
    color: var(--text-muted);
    margin: 0 0 2px;
    text-transform: uppercase;
    letter-spacing: 0.03em;
  }
  .breakdown-item p.value {
    font-size: 15px;
    font-weight: 600;
    color: var(--text-secondary);
    margin: 0;
  }
  .breakdown-item p.each {
    font-size: 10px;
    color: var(--text-muted);
    margin: 2px 0 0;
  }
  @media (max-width: 480px) {
    .results { grid-template-columns: 1fr; }
  }
</style>
</head>
<body>

<div class="card">
  <h1>DGA estimated compliance score calculator</h1>

  <div class="control">
    <div class="control-header">
      <label>Mandatory criteria passed</label>
      <span><span id="mand-out">8</span> / <span id="mand-max-out">8</span> applicable</span>
    </div>
    <input type="range" min="0" max="8" step="1" value="8" id="mand" />
  </div>

  <div class="control">
    <div class="control-header">
      <label>Remaining criteria passed</label>
      <span><span id="rem-out">20</span> / <span id="rem-max-out">34</span> applicable</span>
    </div>
    <input type="range" min="0" max="34" step="1" value="20" id="rem" />
  </div>

  <div class="control">
    <div class="control-header">
      <label>N/A mandatory criteria</label>
      <span><span id="mand-na-out">0</span> / 8</span>
    </div>
    <input type="range" min="0" max="7" step="1" value="0" id="mand-na" />
  </div>

  <div class="control">
    <div class="control-header">
      <label>N/A remaining criteria</label>
      <span><span id="rem-na-out">0</span> / 34</span>
    </div>
    <input type="range" min="0" max="33" step="1" value="0" id="rem-na" />
  </div>

  <div class="breakdown">
    <div class="breakdown-item">
      <p class="label">Mandatory</p>
      <p class="value" id="mand-score">40.0%</p>
      <p class="each" id="mand-each">5.00% each</p>
    </div>
    <div class="breakdown-item">
      <p class="label">Remaining</p>
      <p class="value" id="rem-score">35.3%</p>
      <p class="each" id="rem-each">1.76% each</p>
    </div>
  </div>

  <div class="results">
    <div class="result-card score">
      <p class="result-label">Estimated Compliance Score</p>
      <p class="result-value" id="total-score">75.3%</p>
      <div class="score-bar-wrap">
        <div class="bar-labels">
          <span>0%</span>
          <span>70% target</span>
          <span>100%</span>
        </div>
        <div class="bar-track">
          <div class="bar-fill" id="bar-fill" style="width: 75.3%;"></div>
          <div class="bar-target"></div>
        </div>
        <p class="status-line" id="status-line">Above the 70% target by 5.3 points.</p>
      </div>
    </div>

    <div class="result-card eligibility">
      <p class="result-label">High Adoption Eligibility</p>
      <span class="result-badge" id="gate-badge">✅ Eligible</span>
      <p class="result-reason" id="gate-detail" style="display: none;"></p>
    </div>
  </div>
</div>

<script>
  const mandNA = document.getElementById('mand-na');
  const mand = document.getElementById('mand');
  const remNA = document.getElementById('rem-na');
  const rem = document.getElementById('rem');

  const mandNAOut = document.getElementById('mand-na-out');
  const mandOut = document.getElementById('mand-out');
  const mandMaxOut = document.getElementById('mand-max-out');
  const remNAOut = document.getElementById('rem-na-out');
  const remOut = document.getElementById('rem-out');
  const remMaxOut = document.getElementById('rem-max-out');

  const mandScore = document.getElementById('mand-score');
  const remScore = document.getElementById('rem-score');
  const mandEach = document.getElementById('mand-each');
  const remEach = document.getElementById('rem-each');
  const totalScore = document.getElementById('total-score');
  const barFill = document.getElementById('bar-fill');
  const statusLine = document.getElementById('status-line');
  const gateDetail = document.getElementById('gate-detail');
  const gateBadge = document.getElementById('gate-badge');

  function update() {
    const mNA = parseInt(mandNA.value, 10);
    const rNA = parseInt(remNA.value, 10);

    const mandApplicable = 8 - mNA;
    const remApplicable = 34 - rNA;

    mand.max = mandApplicable;
    rem.max = remApplicable;
    if (parseInt(mand.value, 10) > mandApplicable) mand.value = mandApplicable;
    if (parseInt(rem.value, 10) > remApplicable) rem.value = remApplicable;

    const mVal = parseInt(mand.value, 10);
    const rVal = parseInt(rem.value, 10);

    mandNAOut.textContent = mNA;
    remNAOut.textContent = rNA;
    mandOut.textContent = mVal;
    mandMaxOut.textContent = mandApplicable;
    remOut.textContent = rVal;
    remMaxOut.textContent = remApplicable;

    const mWeightEach = mandApplicable > 0 ? 40 / mandApplicable : 0;
    const mContribution = mVal * mWeightEach;

    const stage1Count = Math.min(21, remApplicable);
    const stage2Count = Math.max(0, remApplicable - 21);
    const weight1 = stage1Count > 0 ? 30 / stage1Count : 0;
    const weight2 = stage2Count > 0 ? 30 / stage2Count : 0;

    let rContribution;
    if (rVal <= stage1Count) {
      rContribution = rVal * weight1;
    } else {
      rContribution = stage1Count * weight1 + (rVal - stage1Count) * weight2;
    }

    const total = mContribution + rContribution;

    mandEach.textContent = mWeightEach.toFixed(2) + '% each';
    remEach.textContent = weight1.toFixed(2) + '% (1–21)' + (stage2Count > 0 ? ', ' + weight2.toFixed(2) + '% (22+)' : '');
    mandScore.textContent = mContribution.toFixed(1) + '%';
    remScore.textContent = rContribution.toFixed(1) + '%';
    totalScore.textContent = total.toFixed(1) + '%';

    const clampedWidth = Math.min(total, 100);
    barFill.style.width = clampedWidth.toFixed(1) + '%';
    barFill.style.background = total >= 70 ? '#1d9e75' : '#d85a30';

    const diff = (total - 70).toFixed(1);
    if (total >= 70) {
      statusLine.textContent = 'Above the 70% target by ' + Math.abs(diff) + ' points.';
    } else {
      statusLine.textContent = Math.abs(diff) + ' points below the 70% target.';
    }

    const mandFailed = mandApplicable - mVal;
    let eligible, reason;
    if (mandFailed > 0) {
      eligible = false;
      reason = 'One or more Mandatory Criteria were not met.';
    } else if (rVal >= 21) {
      eligible = true;
      reason = '';
    } else {
      eligible = false;
      reason = 'At least 21 Remaining Criteria must be achieved.';
    }

    gateBadge.textContent = eligible ? '✅ Eligible' : '❌ Not Eligible';
    gateBadge.className = 'result-badge ' + (eligible ? 'met' : 'not-met');
    if (reason) {
      gateDetail.textContent = 'Reason: ' + reason;
      gateDetail.style.display = 'block';
    } else {
      gateDetail.textContent = '';
      gateDetail.style.display = 'none';
    }
  }

  [mandNA, mand, remNA, rem].forEach(el => el.addEventListener('input', update));
  update();
</script>

</body>
</html>
